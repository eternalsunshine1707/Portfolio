<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Curtain Intro Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Courier New',monospace;background:#0d0d1a;color:#fff;height:100vh;overflow:hidden}

/* ── CURTAIN OVERLAY ── */
.curtain{position:fixed;inset:0;z-index:9999;display:flex;pointer-events:none}
.strip{flex:1;background:#1a7a4a;transform-origin:top;animation:drop 0.9s cubic-bezier(.76,0,.24,1) forwards}
@keyframes drop{to{transform:scaleY(0)}}

/* stagger each strip's start time to create the sweep */
.strip:nth-child(1){animation-delay:.00s}
.strip:nth-child(2){animation-delay:.04s}
.strip:nth-child(3){animation-delay:.08s}
.strip:nth-child(4){animation-delay:.12s}
.strip:nth-child(5){animation-delay:.16s}
.strip:nth-child(6){animation-delay:.20s}
.strip:nth-child(7){animation-delay:.24s}
.strip:nth-child(8){animation-delay:.28s}
.strip:nth-child(9){animation-delay:.32s}
.strip:nth-child(10){animation-delay:.36s}
.strip:nth-child(11){animation-delay:.40s}
.strip:nth-child(12){animation-delay:.44s}
.strip:nth-child(13){animation-delay:.48s}
.strip:nth-child(14){animation-delay:.52s}

/* ── PAGE CONTENT (revealed underneath) ── */
.page{position:relative;height:100vh;display:flex;align-items:center;padding:0 80px;background:#0d0d1a}
.tag{color:#2ecc71;font-size:.85rem;letter-spacing:.05em;margin-bottom:14px;opacity:0;animation:fadeUp .6s ease-out .9s forwards}
h1{font-size:3.2rem;font-weight:700;line-height:1.2;margin-bottom:16px;opacity:0;animation:fadeUp .6s ease-out 1.05s forwards}
h1 .accent{color:#2ecc71}
.sub{color:rgba(255,255,255,.5);font-size:1rem;opacity:0;animation:fadeUp .6s ease-out 1.2s forwards}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}

/* ── ROTATING RING AROUND IMAGE (separate, continuous) ── */
.ring-wrap{position:absolute;right:100px;top:50%;transform:translateY(-50%);width:340px;height:340px;opacity:0;animation:fadeIn .6s ease-out 1.3s forwards}
@keyframes fadeIn{to{opacity:1}}
.ring-img{position:absolute;inset:20px;border-radius:50%;background:linear-gradient(135deg,#7c5cff,#2ecc71);display:flex;align-items:center;justify-content:center;font-size:3rem}
.ring-dashed{position:absolute;inset:0;border-radius:50%;border:2px dashed #2ecc71;animation:spin 12s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

.replay{position:fixed;bottom:24px;left:80px;z-index:10;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.2);color:#fff;padding:10px 20px;border-radius:8px;cursor:pointer;font-family:inherit;font-size:.8rem}
</style>
</head>
<body>

<div class="curtain" id="curtain">
  <div class="strip"></div><div class="strip"></div><div class="strip"></div><div class="strip"></div>
  <div class="strip"></div><div class="strip"></div><div class="strip"></div><div class="strip"></div>
  <div class="strip"></div><div class="strip"></div><div class="strip"></div><div class="strip"></div>
  <div class="strip"></div><div class="strip"></div>
</div>

<div class="page">
  <div>
    <div class="tag">Fullstack Developer</div>
    <h1>Hello I'm<br><span class="accent">Sravani B</span></h1>
    <div class="sub">7+ years building pipelines, dashboards, and architectures that scale.</div>
  </div>
  <div class="ring-wrap">
    <div class="ring-dashed"></div>
    <div class="ring-img">🌙</div>
  </div>
</div>

<button class="replay" onclick="replay()">Replay intro</button>

<script>
function replay(){
  const old = document.getElementById('curtain');
  old.remove();
  const c = document.createElement('div');
  c.className = 'curtain';
  c.id = 'curtain';
  for(let i=0;i<14;i++){
    const s = document.createElement('div');
    s.className = 'strip';
    c.appendChild(s);
  }
  document.body.prepend(c);
  document.querySelectorAll('.tag,h1,.sub,.ring-wrap').forEach(el=>{
    el.style.animation='none';
    void el.offsetWidth;
    el.style.animation=null;
  });
}
</script>
</body>
</html>
